<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Article</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body class="article-page">

<section class="article-container">

  <a href="../news.html" class="back-btn" id="back-to-news" data-i18n="backToNews">← Back to News</a>

  <div class="breadcrumb">
    <a href="../index.html" id="breadcrumb-home" data-i18n="home">Home</a> →
    <a href="../news.html" id="breadcrumb-news" data-i18n="news">News</a> →
    <span id="breadcrumb-title"></span>
  </div>

  <div class="article-hero">
    <img id="article-image" src="" alt="">
  </div>

  <h1 id="article-title" class="fade-title"></h1>

  <div class="article-meta">
      <button id="like-button">❤️ Like <span id="like-count">0</span></button>
      <span class="view-counter">👁️ <span id="view-count">0</span></span>
  </div>

  <div id="article-tags"></div>

  <p id="article-fulltext" class="article-fulltext"></p>

  <h2 id="related-title" data-i18n="relatedArticles">Related Articles</h2>
  <div id="related-articles" class="related-grid"></div>

  <h2 id="comments-title" data-i18n="comments_title">Comments</h2>
  <div id="comments-container"></div>
  <textarea id="comment-input" placeholder="Write a comment..."></textarea>
  <button id="comment-post" data-i18n="postComment">Post Comment</button>

  <div class="share-section">
    <h3 id="share-title" data-i18n="shareThisArticle">Share this article</h3>
    <div class="share-buttons">
      <a id="share-twitter"  href="#" target="_blank">Twitter</a>
      <a id="share-facebook" href="#" target="_blank">Facebook</a>
      <a id="share-whatsapp" href="#" target="_blank">WhatsApp</a>
    </div>

  </div>

</section>

<script src="article.js"></script>
</body>
</html>
